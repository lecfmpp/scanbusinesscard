# Netlify build & serve config for ScanBusinessCard (migrated off Lovable)
# Backend stays on the existing Supabase (Lovable Cloud) project — this only
# controls how the static web app is built and served.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Vite reads VITE_* at build time. Set these in Netlify UI
  # (Site settings → Environment variables) to match .env:
  #   VITE_SUPABASE_URL
  #   VITE_SUPABASE_PUBLISHABLE_KEY
  #   VITE_SUPABASE_PROJECT_ID
  #
  # ONLY the five vars above plus SUPABASE_URL and SUPABASE_ANON_KEY belong in
  # Netlify. Edge-function secrets (GEMINI_API_KEY, STRIPE_SECRET_KEY,
  # HUBSPOT_*, SLACK_*, APPLE_SHARED_SECRET, FRONTEND_URL) live in Supabase
  # → Edge Functions → Secrets. Declaring them here does nothing except put
  # them in the secrets scanner's scope, which fails the build.
  #
  # Every key below is public by design, so secrets scanning must not treat it
  # as a leak:
  #   * the project id (yvfutrzyckkeikwstovq) and project URL are plain
  #     identifiers. They appear on purpose in supabase/config.toml, the /blog
  #     edge function, and the public /.well-known/* discovery documents.
  #   * the anon / publishable key is designed to ship to browsers. It carries
  #     no privileges of its own and every table is guarded by RLS. Vite inlines
  #     it into the client bundle, so it is unavoidably present in dist/.
  # Without these omissions the scanner sees each value in the repo and fails
  # the build.
  #
  # Never add a genuinely private value here — service_role key, Stripe key, or
  # any OAuth client secret. Those belong in Supabase's edge function secrets
  # and must never reach this repo, which is public.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_PROJECT_ID,VITE_SUPABASE_PUBLISHABLE_KEY,SUPABASE_URL,SUPABASE_ANON_KEY"

# SPA fallback + header rules live in public/_redirects and public/_headers
# so they are copied into dist/ on every build. Netlify serves real static
# files (robots.txt, /.well-known/*, auth.md, llms.txt) before the SPA
# fallback, so those are never shadowed by index.html.

# ---------------------------------------------------------------------------
# Blog: server-rendered from Supabase so posts are fully crawlable HTML
# (no JS required) for search engines and AI answer engines.
# Requires env vars SUPABASE_URL and SUPABASE_ANON_KEY set in the Netlify UI.
# Edge functions run before the SPA redirect, so /blog never hits index.html.
# ---------------------------------------------------------------------------
[[edge_functions]]
  path = "/blog"
  function = "blog"

[[edge_functions]]
  path = "/blog/*"
  function = "blog"
